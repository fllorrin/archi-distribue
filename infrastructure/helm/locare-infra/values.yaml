namespace: locare

exposeLocal:
  enabled: false
  keycloakNodePort: 30080
  kafkaUiNodePort: 30085
  grafanaNodePort: 30001
  prometheusNodePort: 30090
  jaegerNodePort: 30686

keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.0
  adminUser: admin
  adminPassword: admin
  realmFile: files/LoCarE-realm.json
  extraEnv:
    - name: JAVA_OPTS_KC_HEAP
      value: -XX:MaxRAMPercentage=55 -XX:InitialRAMPercentage=30 -XX:MaxMetaspaceSize=256m
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1024Mi
  db:
    host: postgres-keycloak
    name: keycloak
    user: keycloak
    password: keycloak

postgresKeycloak:
  enabled: true
  image: postgres:16
  db: keycloak
  user: keycloak
  password: keycloak

postgresVehicules:
  enabled: true
  image: postgres:16
  db: vehicules
  user: vehicules
  password: vehicules

vehiculesService:
  enabled: true
  image: locare-vehicules:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8081
    targetPort: 8081
  ingress:
    enabled: true
    className: traefik
    host: api.locare.local
    path: /graphql
    restPath: /vehicles
    pathType: Prefix
    annotations: {}
  database:
    host: postgres-vehicules
    port: 5432
    name: vehicules
    user: vehicules
    password: vehicules
  kafka:
    enabled: true
    bootstrapServers: kafka:9092
    topicVehicle: vehicule_topic
    groupId: vehicules-service
  security:
    enabled: true
    jwtIssuerUri: http://keycloak:8080/realms/LoCarE

postgresConducteurs:
  enabled: true
  image: postgres:16
  db: conducteurs
  user: conducteurs
  password: conducteurs

conducteursService:
  enabled: true
  image: locare-conducteurs:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8082
    targetPort: 8082
  ingress:
    enabled: false
    className: traefik
    host: conducteurs.api.locare.local
    path: /graphql
    restPath: /drivers
    pathType: Prefix
    annotations: {}
  database:
    host: postgres-conducteurs
    port: 5432
    name: conducteurs
    user: conducteurs
    password: conducteurs
  kafka:
    enabled: true
    bootstrapServers: kafka:9092
    topicConducteur: conducteur_topic
    groupId: conducteurs-service
  security:
    enabled: true
    jwtIssuerUri: http://keycloak:8080/realms/LoCarE

postgresLocation:
  enabled: true
  image: postgres:16
  db: location
  user: location
  password: location

postgresMaintenance:
  enabled: true
  image: postgres:16
  db: maintenance
  user: maintenance
  password: maintenance

maintenanceService:
  enabled: true
  image: locare-maintenance:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8085
    targetPort: 8085
  ingress:
    enabled: false
    className: traefik
    host: maintenance.api.locare.local
    path: /graphql
    restPath: /interventions
    pathType: Prefix
    annotations: {}
  database:
    host: postgres-maintenance
    port: 5432
    name: maintenance
    user: maintenance
    password: maintenance
  kafka:
    enabled: true
    bootstrapServers: kafka:9092
    topicMaintenance: maintenance_topic
    topicVehicle: vehicule_topic
    topicVehicleDlt: vehicule_topic.dlt
    groupId: maintenance-service
    retryIntervalMs: 1000
    retryMaxAttempts: 2
  security:
    enabled: true
    jwtIssuerUri: http://keycloak:8080/realms/LoCarE

evenementsService:
  enabled: true
  image: locare-evenements:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8084
    targetPort: 8084
  ingress:
    enabled: false
    className: traefik
    host: evenements.api.locare.local
    path: /graphql
    restPath: /events
    pathType: Prefix
    annotations: {}
  database:
    host: postgres-evenements
    port: 5432
    name: evenements
    user: evenements
    password: evenements
  kafka:
    enabled: true
    bootstrapServers: kafka:9092
    topicVehicle: vehicule_topic
    groupId: evenements-service
  security:
    enabled: true
    jwtIssuerUri: http://keycloak:8080/realms/LoCarE

gatewayService:
  enabled: true
  image: locare-gateway:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8086
    targetPort: 8086
  ingress:
    enabled: true
    className: traefik
    host: gateway.api.locare.local
    path: /graphql
    pathType: Prefix
    annotations: {}
  downstream:
    vehiculesGraphqlUrl: http://vehicules-service:8081/graphql
    conducteursGraphqlUrl: http://conducteurs-service:8082/graphql
    maintenanceGraphqlUrl: http://maintenance-service:8085/graphql
  security:
    enabled: true
    jwtIssuerUri: http://keycloak:8080/realms/LoCarE

postgresEvenements:
  enabled: true
  image: postgres:16
  db: evenements
  user: evenements
  password: evenements

redis:
  enabled: true
  image: redis:7-alpine

kafka:
  enabled: true
  image: bitnamilegacy/kafka:4.0.0-debian-12-r10
  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
  nodeId: "1"
  controllerQuorumVoters: "1@kafka:9093"
  listeners: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
  advertisedListeners: PLAINTEXT://kafka:9092

kafkaUi:
  enabled: true
  image: provectuslabs/kafka-ui:latest

timescaledbLocalisation:
  enabled: true
  image: timescale/timescaledb-ha:pg16
  db: localisation
  user: localisation
  password: localisation

otelCollector:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.109.0

jaeger:
  enabled: true
  image: jaegertracing/all-in-one:1.61.0

prometheus:
  enabled: true
  image: prom/prometheus:v2.54.1

loki:
  enabled: true
  image: grafana/loki:3.2.1

grafana:
  enabled: true
  image: grafana/grafana:11.2.0
  adminUser: admin
  adminPassword: admin
